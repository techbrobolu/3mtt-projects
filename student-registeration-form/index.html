<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Registeration Form</title>
  </head>
  <body>
    <main>
      <h1>Student Registeration Form</h1>
      <form action="submit.php" method="post">
        <div class="form-input student-full-name">
          <label class="form-label-top" for="first-name">Full Name</label>
          <div class="name-inputs">
            <div class="name-input first-name-input">
              <input type="text" id="first-name" name="first_name" required />
              <label class="form-sub-label" for="first-name">First Name</label>
            </div>

            <div class="name-input last-name-input">
              <input type="text" id="last-name" name="last_name" required />
              <label class="form-sub-label" for="last-name">Last Name</label>
            </div>
          </div>
        </div>

        <div class="form-input contact-input email-input">
          <label class="form-label-top" for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="ex: myname@example.com"
            required
          />
        </div>

        <div class="form-input contact-input phone-input">
          <label class="form-label-top" for="phone">Phone Number</label>
          <input
            type="tel"
            id="phone"
            name="phone"
            placeholder="(000) 000-000-0000"
            required
          />
        </div>

        <div class="form-input age-input">
          <label class="form-label-top" for="age">Age</label>
          <input type="number" id="age" name="age" min="0" max="120" required />
        </div>

        <div class="form-input gender-input">
          <label class="form-label-top" for="gender">Gender</label>
          <select id="gender" name="gender" required>
            <option value="">Select Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
          </select>
        </div>

        <div class="form-input course-input">
          <label class="form-label-top" for="course">Course</label>
          <select id="course" name="course" required>
            <option value="">Select Course</option>
            <option value="computer-science">Computer Science</option>
            <option value="mathematics">Mathematics</option>
            <option value="physics">Physics</option>
          </select>
        </div>

        <div class="form-input date-input">
          <label class="form-label-top" for="date">Date of Birth</label>
          <input type="date" id="date" name="date" required />
        </div>

        <div class="form-buttons">
          <button type="reset" class="form-button reset-button">Reset</button>
          <button type="submit" class="form-button submit-button">Submit</button>
        </div>
      </form>
    </main>
  </body>
</html>
